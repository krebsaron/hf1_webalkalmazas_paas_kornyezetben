{% extends 'base.html' %}
{% block title %}Delete Photo – PhotoAlbum{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirm Deletion</h4>
            </div>
            <div class="card-body text-center p-4">
                <img src="{{ photo.image.url }}" alt="{{ photo.name }}"
                     class="img-fluid rounded mb-3 shadow-sm" style="max-height: 200px;">
                <p class="fs-5 mb-1">Are you sure you want to delete:</p>
                <p class="fw-bold fs-4 mb-1">"{{ photo.name }}"</p>
                <p class="text-muted small mb-4">Uploaded {{ photo.upload_date|date:"Y-m-d H:i" }}</p>
                <p class="text-danger fw-semibold">This action cannot be undone.</p>
            </div>
            <div class="card-footer d-flex gap-2 justify-content-center">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Yes, Delete
                    </button>
                </form>
                <a href="{% url 'photo_detail' photo.pk %}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
